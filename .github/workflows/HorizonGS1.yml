name:  Horizon-GS Offline Conda Pack (Safe Pip Included, Fixed)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04

    steps:
      - name:  检出 Horizon-GS 仓库（含子模块）
        uses: actions/checkout@v5
        with:
          repository: InternRobotics/HorizonGS
          submodules: recursive
          path: Horizon-GS

      - name:  安装 Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          conda-remove-defaults: false
          python-version: "3.8"
          miniconda-version: "latest"

      - name:  创建 conda 环境并安装安全 pip 包
        shell: bash -l {0}
        run: |
          # 创建只含 conda 依赖的纯净环境
          cat > clean_env.yaml << 'EOF'
          name: horizon_gs
          channels:
            - pytorch
            - pyg
            - conda-forge
            - defaults
          dependencies:
            - cudatoolkit=11.8
            - python=3.8.19
            - pip=24.2
            - pytorch=2.1.2
            - torchaudio=2.1.2
            - torchvision=0.16.2
            - pytorch-scatter
          EOF

          conda env create -f clean_env.yaml -p ./conda-env
          conda clean -afy

          # 直接使用环境中的 pip 安装那 11 个纯 Python 包（无需激活脚本）
          ./conda-env/bin/pip install --no-cache-dir \
            plyfile \
            tensorboard \
            tqdm \
            einops \
            wandb \
            lpips \
            laspy \
            jaxtyping \
            colorama \
            opencv-python \
            scikit-learn

          echo "环境大小："
          du -sh conda-env

      - name:  使用 conda-pack 打包环境
        shell: bash -l {0}
        run: |
          conda install -n base -c conda-forge conda-pack -y
          conda run -n base conda-pack -p ./conda-env -o horizon_gs_env.tar.gz
          echo "打包完成，文件大小："
          ls -lh horizon_gs_env.tar.gz

      - name:  分割为 1.9GB 分片
        run: |
          mkdir -p parts
          split -b 1900M -d horizon_gs_env.tar.gz parts/horizon_gs_env.tar.gz.part_
          echo "分片完成："
          ls -lh parts/

      - name:  发布 Release 并上传所有分片
        uses: softprops/action-gh-release@v3
        with:
          tag_name: conda-pack-${{ github.run_id }}
          name: "Horizon-GS Conda Env (Safe Pip) - Run ${{ github.run_id }}"
          body: |
            ### 离线 Conda 环境 + 常用 pip 包（无 gsplat-2dgs）
            运行 ID：${{ github.run_id }}
            **包含的包：**
            - Conda：cudatoolkit=11.8, python=3.8.19, pytorch=2.1.2, torchaudio, torchvision, pytorch-scatter
            - Pip：plyfile, tensorboard, tqdm, einops, wandb, lpips, laspy, jaxtyping, colorama, opencv-python, scikit-learn

            **使用：**
            ```bash
            cat horizon_gs_env.tar.gz.part_* > horizon_gs_env.tar.gz
            tar -xzf horizon_gs_env.tar.gz -C /your/path
            source /your/path/bin/activate
            conda-unpack
