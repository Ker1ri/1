name: Pack milo Conda Environment

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pack:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Miniconda (base only)
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: latest
          auto-update-conda: false
          auto-activate-base: false

      - name: Create milo environment
        shell: bash -el {0}
        run: |
          set -euxo pipefail

          conda create -n milo python=3.9 pip -y

          conda install -n milo -y \
            -c pytorch -c nvidia -c conda-forge \
            pytorch=2.3.1 torchvision=0.18.1 torchaudio=2.3.1 \
            pytorch-cuda=12.1 \
            mkl=2023.1.0 \
            cmake gmp cgal

          conda run -n milo pip install \
            open3d==0.19.0 \
            trimesh==4.6.8 \
            scikit-image==0.24.0 \
            "opencv-python==4.11.0.86" \
            plyfile==1.1 \
            tqdm==4.67.1

      - name: Show conda information
        shell: bash -el {0}
        run: |
          set -euxo pipefail

          echo "CONDA=$CONDA"
          conda info
          conda env list

          echo "Disk after environment creation:"
          df -h

          echo "milo env size:"
          du -sh "$CONDA/envs/milo"

      - name: Check milo environment
        shell: bash -el {0}
        run: |
          set -euxo pipefail

          echo "Check Python version:"
          conda run -n milo python -V

          echo "Check PyTorch:"
          conda run -n milo python - <<'PY'
          import torch
          print("torch:", torch.__version__)
          print("torch cuda:", torch.version.cuda)
          print("cuda available:", torch.cuda.is_available())
          assert torch.version.cuda is not None, "Not a CUDA build!"
          PY

          echo "Check pip packages:"
          conda run -n milo python - <<'PY'
          import open3d, trimesh, skimage, cv2, plyfile, tqdm
          print("open3d:", open3d.__version__)
          print("trimesh:", trimesh.__version__)
          print("scikit-image:", skimage.__version__)
          print("cv2:", cv2.__version__)
          print("plyfile:", plyfile.__version__)
          print("tqdm:", tqdm.__version__)
          print("all packages imported successfully")
          PY

      - name: Install conda-pack into base with pip
        shell: bash
        run: |
          set -exo pipefail

          "$CONDA/bin/python" -m pip install "conda-pack==0.9.1"
          "$CONDA/bin/conda-pack" --version

      - name: Clean caches before packing
        shell: bash -el {0}
        run: |
          set -euxo pipefail

          conda clean -a -y
          rm -rf ~/.cache/pip ~/.cache/torch ~/.cache/conda ~/.nv || true

          echo "milo env size:"
          du -sh "$CONDA/envs/milo"

          echo "Disk after clean:"
          df -h

      - name: Pack and split milo environment
        shell: bash
        run: |
          set -exo pipefail

          rm -rf release_parts && mkdir -p release_parts
          rm -f milo.tar.gz

          "$CONDA/bin/conda-pack" \
            -n milo \
            -o milo.tar.gz \
            --format tar.gz \
            --ignore-missing-files \
            --force

          ls -lh milo.tar.gz
          df -h

          split -b 1000M -d -a 3 milo.tar.gz release_parts/milo.tar.gz.part-
          sha256sum milo.tar.gz > release_parts/milo.tar.gz.sha256
          rm -f milo.tar.gz

          cd release_parts
          sha256sum milo.tar.gz.part-* > SHA256SUMS.txt
          cat SHA256SUMS.txt
          cat milo.tar.gz.sha256

          df -h

      - name: Create GitHub Release and upload parts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: milo-conda-${{ github.run_number }}
          name: milo Conda Environment ${{ github.run_number }}
          body: |
            milo Conda environment package.

            Environment name:
            ```
            milo
            ```

            Python version:
            ```
            3.9
            ```
          files: |
            release_parts/milo.tar.gz.part-*
            release_parts/SHA256SUMS.txt
          fail_on_unmatched_files: true
