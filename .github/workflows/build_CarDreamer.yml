name: Build CarDreamer Offline Conda Pack

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-offline-env:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    env:
      ENV_NAME: cardreamer
      PYTHON_VERSION: "3.10"
      PACK_NAME: cardreamer_env_ubuntu2204_py310_cuda121
      CONDA_ENV_DIR: /usr/share/miniconda/envs/cardreamer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: ${{ env.PYTHON_VERSION }}
          activate-environment: ${{ env.ENV_NAME }}
          environment-file: ""
          auto-activate-base: false

      - name: Create conda environment
        shell: bash -l {0}
        run: |
          conda create -y -n "${ENV_NAME}" python="${PYTHON_VERSION}"
          conda activate "${ENV_NAME}"
          python --version
          pip --version

      - name: Install basic build tools
        shell: bash -l {0}
        run: |
          conda activate "${ENV_NAME}"
          python -m pip install --upgrade pip setuptools wheel
          pip install flit conda-pack

      - name: Install CarDreamer package
        shell: bash -l {0}
        run: |
          conda activate "${ENV_NAME}"
          if [ ! -f "pyproject.toml" ]; then
            echo "pyproject.toml not found in repository root."
            echo "Please make sure this workflow is placed in the CarDreamer repository root."
            exit 1
          fi

          # 安装 CarDreamer 本体
          flit install --symlink

      - name: Install DreamerV3 dependencies
        shell: bash -l {0}
        run: |
          conda activate "${ENV_NAME}"

          if [ ! -f "dreamerv3/requirements.txt" ]; then
            echo "dreamerv3/requirements.txt not found."
            exit 1
          fi

          pip install -r dreamerv3/requirements.txt

      - name: Reinstall JAX with CUDA 12 support
        shell: bash -l {0}
        run: |
          conda activate "${ENV_NAME}"

          # 先卸载 requirements.txt 里可能已经装入的 jax/jaxlib
          pip uninstall -y jax jaxlib || true

          # 安装 CUDA12 版本 JAX
          pip install --upgrade "jax[cuda12]==0.4.34"

      - name: Install CUDA 12.1 runtime libs from conda-forge
        shell: bash -l {0}
        run: |
          conda activate "${ENV_NAME}"

          # 尽量补齐常见运行时库，便于离线迁移
          conda install -y -c conda-forge \
            cuda-version=12.1 \
            cudatoolkit || true

      - name: Validate imports
        shell: bash -l {0}
        run: |
          conda activate "${ENV_NAME}"

          python - <<'PY'
          import sys
          print("Python:", sys.version)

          mods = [
              "carla",
              "jax",
              "tensorflow",
              "numpy",
              "cv2",
              "matplotlib",
              "optax",
              "ruamel.yaml",
              "einops",
          ]

          for m in mods:
              try:
                  __import__(m)
                  print(f"[OK] import {m}")
              except Exception as e:
                  print(f"[FAIL] import {m}: {e}")
                  raise
          PY

      - name: Export environment info
        shell: bash -l {0}
        run: |
          conda activate "${ENV_NAME}"

          mkdir -p output

          {
            echo "===== conda info ====="
            conda info
            echo
            echo "===== conda list ====="
            conda list
          } > output/env_info.txt

          pip freeze > output/pip_freeze.txt

          python - <<'PY' > output/python_check.txt
          import sys
          print("Python executable:", sys.executable)
          print("Python version:", sys.version)

          try:
              import jax
              print("JAX version:", jax.__version__)
          except Exception as e:
              print("JAX import failed:", e)

          try:
              import tensorflow as tf
              print("TensorFlow version:", tf.__version__)
              print("TF GPUs:", tf.config.list_physical_devices('GPU'))
          except Exception as e:
              print("TensorFlow import failed:", e)

          try:
              import carla
              print("CARLA module:", carla)
          except Exception as e:
              print("CARLA import failed:", e)
          PY

      - name: Pack conda environment
        shell: bash -l {0}
        run: |
          conda activate "${ENV_NAME}"

          mkdir -p output
          conda-pack -n "${ENV_NAME}" -o "output/${PACK_NAME}.tar.gz"

      - name: Archive repository helper scripts
        shell: bash -l {0}
        run: |
          mkdir -p output

          cat > output/restore_env.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail

          if [ $# -lt 2 ]; then
            echo "Usage: bash restore_env.sh <packed_env.tar.gz> <target_dir>"
            exit 1
          fi

          PACK_FILE="$1"
          TARGET_DIR="$2"

          mkdir -p "${TARGET_DIR}"
          tar -xzf "${PACK_FILE}" -C "${TARGET_DIR}"

          source "${TARGET_DIR}/bin/activate"
          "${TARGET_DIR}/bin/conda-unpack"

          echo "Environment restored to: ${TARGET_DIR}"
          echo "Activate with: source ${TARGET_DIR}/bin/activate"
          SH

          chmod +x output/restore_env.sh

          cat > output/run_env_check.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail

          python - <<'PY'
          import sys
          print("Python:", sys.version)

          try:
              import jax
              print("JAX:", jax.__version__)
              try:
                  print("JAX devices:", jax.devices())
              except Exception as e:
                  print("JAX devices failed:", e)
          except Exception as e:
              print("JAX import failed:", e)

          try:
              import tensorflow as tf
              print("TensorFlow:", tf.__version__)
              print("TF GPUs:", tf.config.list_physical_devices('GPU'))
          except Exception as e:
              print("TensorFlow import failed:", e)

          try:
              import carla
              print("CARLA import OK")
          except Exception as e:
              print("CARLA import failed:", e)
          PY
          SH

          chmod +x output/run_env_check.sh

      - name: Upload packed environment
        uses: actions/upload-artifact@v4
        with:
          name: cardreamer-offline-conda-pack
          path: output/
          if-no-files-found: error
