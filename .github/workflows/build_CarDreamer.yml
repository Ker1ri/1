name: Pack CarDreamer DreamerV3 Runtime Env

on:
  workflow_dispatch:

jobs:
  pack-env:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    env:
      ENV_NAME: cardreamer
      PYTHON_VERSION: "3.10"
      PACK_NAME: cardreamer-dreamerv3-runtime-py310-ubuntu2204.tar.gz

    steps:
      - name: Setup Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: ${{ env.ENV_NAME }}
          python-version: ${{ env.PYTHON_VERSION }}
          auto-activate-base: false
          use-mamba: true
          channels: conda-forge,defaults

      - name: Show conda info
        shell: bash -l {0}
        run: |
          conda info
          conda env list
          echo "CONDA=$CONDA"
          python --version
          which python

      - name: Install conda-pack in base
        shell: bash -l {0}
        run: |
          conda activate base

          mamba install -y -c conda-forge conda-pack

          which conda-pack
          conda-pack --version

      - name: Install basic conda runtime dependencies
        shell: bash -l {0}
        run: |
          conda activate $ENV_NAME

          mamba install -y -c conda-forge \
            pip \
            setuptools \
            wheel \
            ffmpeg \
            libstdcxx-ng \
            libgcc-ng \
            libgomp

          conda clean -afy

      - name: Install JAX CUDA 12
        shell: bash -l {0}
        run: |
          conda activate $ENV_NAME

          python -m pip install --no-cache-dir \
            "jax[cuda12_pip]==0.4.34" \
            -f https://storage.googleapis.com/jax-releases/jax_cuda_releases.html

      - name: Create pip requirements
        shell: bash -l {0}
        run: |
          cat > /tmp/cardreamer_requirements.txt <<'EOF'
          cloudpickle==3.0.0
          crafter==1.8.3
          gym==0.12.5
          dm_control==1.0.18
          numpy==1.24.3
          optax==0.2.2
          rich==13.7.1
          ruamel.yaml==0.18.6

          # DreamerV3 Docker 原版用的是 tensorflow-cpu。
          # 这里用 CPU 版 TensorFlow，避免和 JAX CUDA12 混装 CUDA 11.8 库。
          tensorflow-cpu==2.13.0
          tensorflow_probability==0.21.0

          scikit-image==0.23.2
          ffmpeg==1.4
          moviepy==1.0.3
          imageio==2.34.1
          wandb==0.16.6

          # 服务器部署推荐 headless 版本，避免依赖系统 GUI / libGL。
          opencv-python-headless>=4.9,<5.0

          shapely==1.8.4
          matplotlib==3.8.4
          tabulate==0.9.0
          msgpack
          pyzmq
          einops

          # TensorFlow 2.13 需要 typing_extensions < 4.6.0
          typing_extensions==4.5.0
          EOF

          cat > /tmp/cardreamer_constraints.txt <<'EOF'
          jax==0.4.34
          jaxlib==0.4.34
          numpy==1.24.3
          typing_extensions==4.5.0
          EOF

      - name: Install pip runtime dependencies
        shell: bash -l {0}
        run: |
          conda activate $ENV_NAME

          python -m pip install --no-cache-dir \
            -r /tmp/cardreamer_requirements.txt \
            -c /tmp/cardreamer_constraints.txt

      - name: Add activation scripts
        shell: bash -l {0}
        run: |
          conda activate $ENV_NAME

          mkdir -p "$CONDA_PREFIX/etc/conda/activate.d"
          mkdir -p "$CONDA_PREFIX/etc/conda/deactivate.d"

          cat > "$CONDA_PREFIX/etc/conda/activate.d/cardreamer_env.sh" <<'EOF'
          #!/usr/bin/env bash

          export _CARDR_OLD_LD_LIBRARY_PATH="${LD_LIBRARY_PATH:-}"

          export MUJOCO_GL=egl
          export NUMBA_CACHE_DIR=/tmp
          export XLA_PYTHON_CLIENT_MEM_FRACTION=0.8

          # 收集 pip 安装的 NVIDIA CUDA runtime 库路径。
          _CARDR_NVIDIA_LIB_PATHS=""

          for _pkg in \
            cuda_runtime \
            cublas \
            cufft \
            curand \
            cusolver \
            cusparse \
            cudnn \
            nccl \
            nvjitlink
          do
            _path=$(python - <<PY 2>/dev/null || true
          import os
          try:
              import nvidia.${_pkg}
              p = os.path.dirname(nvidia.${_pkg}.__file__)
              lib = os.path.join(p, "lib")
              if os.path.isdir(lib):
                  print(lib)
          except Exception:
              pass
          PY
          )
            if [ -n "$_path" ]; then
              _CARDR_NVIDIA_LIB_PATHS="${_path}:${_CARDR_NVIDIA_LIB_PATHS}"
            fi
          done

          export LD_LIBRARY_PATH="${_CARDR_NVIDIA_LIB_PATHS}${CONDA_PREFIX}/lib:${LD_LIBRARY_PATH:-}"

          unset _pkg
          unset _path
          unset _CARDR_NVIDIA_LIB_PATHS
          EOF

          cat > "$CONDA_PREFIX/etc/conda/deactivate.d/cardreamer_env.sh" <<'EOF'
          #!/usr/bin/env bash

          if [ -n "${_CARDR_OLD_LD_LIBRARY_PATH+x}" ]; then
            export LD_LIBRARY_PATH="${_CARDR_OLD_LD_LIBRARY_PATH}"
            unset _CARDR_OLD_LD_LIBRARY_PATH
          fi

          unset MUJOCO_GL
          unset NUMBA_CACHE_DIR
          unset XLA_PYTHON_CLIENT_MEM_FRACTION
          EOF

          chmod +x "$CONDA_PREFIX/etc/conda/activate.d/cardreamer_env.sh"
          chmod +x "$CONDA_PREFIX/etc/conda/deactivate.d/cardreamer_env.sh"

      - name: Test imports
        shell: bash -l {0}
        run: |
          conda activate $ENV_NAME

          python - <<'PY'
          import sys
          print("Python:", sys.version)

          import numpy
          print("numpy:", numpy.__version__)

          import typing_extensions
          print("typing_extensions imported")

          import jax
          print("jax:", jax.__version__)
          print("jax devices:", jax.devices())

          import tensorflow as tf
          print("tensorflow:", tf.__version__)
          print("tf gpu devices:", tf.config.list_physical_devices("GPU"))

          import tensorflow_probability as tfp
          print("tensorflow_probability:", tfp.__version__)

          import optax
          print("optax:", optax.__version__)

          import gym
          print("gym:", gym.__version__)

          import cv2
          print("opencv:", cv2.__version__)

          import dm_control
          print("dm_control imported")

          import cloudpickle
          import rich
          import ruamel.yaml
          import skimage
          import moviepy
          import imageio
          import wandb
          import shapely
          import matplotlib
          import tabulate
          import msgpack
          import zmq
          import einops

          print("All import tests passed.")
          PY

      - name: Pip check
        shell: bash -l {0}
        run: |
          conda activate $ENV_NAME
          python -m pip check

      - name: Clean package caches
        shell: bash -l {0}
        run: |
          conda activate $ENV_NAME

          python -m pip cache purge || true
          conda clean -afy

          # 注意：
          # 不要删除 __pycache__ / *.pyc。
          # conda-pack 会检查 conda 管理的文件，删除 pyc 会导致 CondaPackError。

      - name: Pack conda environment
        shell: bash -l {0}
        run: |
          conda activate $ENV_NAME

          mkdir -p dist

          "$CONDA/bin/conda-pack" \
            -n "$ENV_NAME" \
            -o "dist/$PACK_NAME" \
            --compress-level 6

          sha256sum "dist/$PACK_NAME" > "dist/$PACK_NAME.sha256"

          ls -lh dist

      - name: Upload packed environment
        uses: actions/upload-artifact@v4
        with:
          name: cardreamer-dreamerv3-runtime-conda-env
          path: |
            dist/${{ env.PACK_NAME }}
            dist/${{ env.PACK_NAME }}.sha256
          if-no-files-found: error
          retention-days: 14
