name: Pack CarDreamer DreamerV3 Conda Env

on:
  workflow_dispatch:

jobs:
  pack-env:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    env:
      ENV_NAME: cardreamer
      PYTHON_VERSION: "3.10"
      PACK_NAME: cardreamer-dreamerv3-py310-ubuntu2204.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: ${{ env.ENV_NAME }}
          python-version: ${{ env.PYTHON_VERSION }}
          auto-activate-base: false
          use-mamba: true
          channels: conda-forge,nvidia/label/cuda-12.1.0,defaults

      - name: Show conda info
        shell: bash -l {0}
        run: |
          conda info
          conda env list
          python --version
          which python

      - name: Install conda dependencies
        shell: bash -l {0}
        run: |
          conda activate $ENV_NAME

          mamba install -y \
            -c conda-forge \
            -c nvidia/label/cuda-12.1.0 \
            pip \
            setuptools \
            wheel \
            conda-pack \
            ffmpeg \
            libstdcxx-ng \
            libgcc-ng \
            cuda-toolkit=12.1

          conda clean -afy

      - name: Create pip requirements
        shell: bash -l {0}
        run: |
          cat > /tmp/cardreamer_requirements.txt <<'EOF'
          cloudpickle==3.0.0
          crafter==1.8.3
          gym==0.12.5
          dm_control==1.0.18
          numpy==1.24.3
          optax==0.2.2
          rich==13.7.1
          ruamel.yaml==0.18.6
          tensorflow[and-cuda]==2.13.0
          tensorflow_probability==0.21.0
          scikit-image==0.23.2
          ffmpeg==1.4
          moviepy==1.0.3
          imageio==2.34.1
          wandb==0.16.6
          opencv-python>=4.9,<5.0
          shapely==1.8.4
          matplotlib==3.8.4
          tabulate==0.9.0
          msgpack
          pyzmq
          einops
          ipykernel
          jupyterlab
          notebook
          ipywidgets
          EOF

      - name: Install pip dependencies
        shell: bash -l {0}
        run: |
          conda activate $ENV_NAME

          python -m pip install --upgrade pip setuptools wheel

          python -m pip install -r /tmp/cardreamer_requirements.txt

      - name: Install JAX CUDA dependencies
        shell: bash -l {0}
        run: |
          conda activate $ENV_NAME

          # 对应 CarDreamer README：
          # pip install "jax[cuda12_pip]==0.4.34" -f https://storage.googleapis.com/jax-releases/jax_cuda_releases.html
          python -m pip install \
            "jax[cuda12_pip]==0.4.34" \
            -f https://storage.googleapis.com/jax-releases/jax_cuda_releases.html

      - name: Add activation scripts
        shell: bash -l {0}
        run: |
          conda activate $ENV_NAME

          mkdir -p "$CONDA_PREFIX/etc/conda/activate.d"
          mkdir -p "$CONDA_PREFIX/etc/conda/deactivate.d"

          cat > "$CONDA_PREFIX/etc/conda/activate.d/cardreamer_env.sh" <<'EOF'
          #!/usr/bin/env bash

          export _CARDR_OLD_LD_LIBRARY_PATH="${LD_LIBRARY_PATH:-}"

          export MUJOCO_GL=egl
          export NUMBA_CACHE_DIR=/tmp
          export XLA_PYTHON_CLIENT_MEM_FRACTION=0.8

          # TensorFlow / JAX pip CUDA packages may provide nvidia.cudnn and nvidia.cusolver.
          if python -c "import nvidia.cudnn, nvidia.cusolver" >/dev/null 2>&1; then
            export CUDNN_PATH=$(dirname $(python -c "import nvidia.cudnn; print(nvidia.cudnn.__file__)"))
            export CUSOLVER_PATH=$(dirname $(python -c "import nvidia.cusolver; print(nvidia.cusolver.__file__)"))
            export LD_LIBRARY_PATH="$CUDNN_PATH/lib:$CUSOLVER_PATH/lib:$CONDA_PREFIX/lib:${LD_LIBRARY_PATH:-}"
          else
            export LD_LIBRARY_PATH="$CONDA_PREFIX/lib:${LD_LIBRARY_PATH:-}"
          fi

          # 如果你在 notebook 中放置了 CARLA，可以手动设置：
          # export CARLA_ROOT=/path/to/CARLA_0.9.15
          # export PYTHONPATH=$CARLA_ROOT/PythonAPI/carla:$CARLA_ROOT/PythonAPI/carla/agents:$PYTHONPATH
          EOF

          cat > "$CONDA_PREFIX/etc/conda/deactivate.d/cardreamer_env.sh" <<'EOF'
          #!/usr/bin/env bash

          if [ -n "${_CARDR_OLD_LD_LIBRARY_PATH+x}" ]; then
            export LD_LIBRARY_PATH="${_CARDR_OLD_LD_LIBRARY_PATH}"
            unset _CARDR_OLD_LD_LIBRARY_PATH
          fi

          unset CUDNN_PATH
          unset CUSOLVER_PATH
          unset MUJOCO_GL
          unset NUMBA_CACHE_DIR
          unset XLA_PYTHON_CLIENT_MEM_FRACTION
          EOF

          chmod +x "$CONDA_PREFIX/etc/conda/activate.d/cardreamer_env.sh"
          chmod +x "$CONDA_PREFIX/etc/conda/deactivate.d/cardreamer_env.sh"

      - name: Register Jupyter kernel
        shell: bash -l {0}
        run: |
          conda activate $ENV_NAME

          python -m ipykernel install \
            --prefix "$CONDA_PREFIX" \
            --name cardreamer \
            --display-name "Python 3.10 CarDreamer DreamerV3"

      - name: Test imports
        shell: bash -l {0}
        run: |
          conda activate $ENV_NAME

          python - <<'PY'
          import sys
          print("Python:", sys.version)

          import numpy
          print("numpy:", numpy.__version__)

          import jax
          print("jax:", jax.__version__)

          import tensorflow as tf
          print("tensorflow:", tf.__version__)

          import optax
          print("optax:", optax.__version__)

          import gym
          print("gym:", gym.__version__)

          import cv2
          print("opencv:", cv2.__version__)

          import dm_control
          print("dm_control imported")

          print("Import test finished.")
          PY

      - name: Clean environment
        shell: bash -l {0}
        run: |
          conda activate $ENV_NAME

          python -m pip cache purge || true
          conda clean -afy

          find "$CONDA_PREFIX" -type d -name "__pycache__" -exec rm -rf {} + || true
          find "$CONDA_PREFIX" -type f -name "*.pyc" -delete || true
          find "$CONDA_PREFIX" -type f -name "*.pyo" -delete || true

      - name: Pack conda environment
        shell: bash -l {0}
        run: |
          conda activate $ENV_NAME

          mkdir -p dist

          conda pack \
            -n "$ENV_NAME" \
            -o "dist/$PACK_NAME" \
            --compress-level 6

          sha256sum "dist/$PACK_NAME" > "dist/$PACK_NAME.sha256"

          ls -lh dist

      - name: Upload packed environment
        uses: actions/upload-artifact@v4
        with:
          name: cardreamer-dreamerv3-conda-env
          path: |
            dist/${{ env.PACK_NAME }}
            dist/${{ env.PACK_NAME }}.sha256
          if-no-files-found: error
          retention-days: 14
