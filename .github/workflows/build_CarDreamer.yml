name: Build CarDreamer Offline Conda Env

on:
  workflow_dispatch:

jobs:
  build-offline-conda-env:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.10"
          miniconda-version: "latest"
          activate-environment: cardreamer
          environment-file: ""
          auto-activate-base: false

      - name: Create conda environment
        shell: bash -l {0}
        run: |
          conda create -y -n cardreamer python=3.10 pip
          conda activate cardreamer
          python --version
          pip --version

      - name: Upgrade pip/setuptools/wheel
        shell: bash -l {0}
        run: |
          conda activate cardreamer
          python -m pip install --upgrade pip setuptools wheel

      - name: Install basic tools
        shell: bash -l {0}
        run: |
          conda activate cardreamer
          pip install flit conda-pack

      - name: Install Python dependencies for CarDreamer + DreamerV3
        shell: bash -l {0}
        run: |
          conda activate cardreamer

          pip install \
            cloudpickle==3.0.0 \
            crafter==1.8.3 \
            gym==0.12.5 \
            dm_control==1.0.18 \
            numpy==1.24.3 \
            optax==0.2.2 \
            rich==13.7.1 \
            ruamel.yaml==0.18.6 \
            "tensorflow[and-cuda]==2.13.0" \
            tensorflow_probability==0.21.0 \
            scikit-image==0.23.2 \
            ffmpeg==1.4 \
            moviepy==1.0.3 \
            imageio==2.34.1 \
            wandb==0.16.6 \
            "opencv-python>=4.9,<5.0" \
            shapely==1.8.4 \
            carla==0.9.15 \
            matplotlib==3.8.4 \
            tabulate==0.9.0 \
            msgpack \
            pyzmq \
            einops

      - name: Install JAX CUDA12 wheels
        shell: bash -l {0}
        run: |
          conda activate cardreamer
          pip install \
            jax==0.4.34 \
            jaxlib==0.4.34 \
            -f https://storage.googleapis.com/jax-releases/jax_cuda_releases.html

      - name: Validate imports
        shell: bash -l {0}
        run: |
          conda activate cardreamer
          python - << 'PY'
          import sys
          print("Python:", sys.version)

          import numpy
          import gym
          import jax
          import tensorflow as tf
          import cv2
          import shapely
          import matplotlib
          import moviepy
          import imageio
          import zmq
          import einops
          import msgpack

          print("numpy:", numpy.__version__)
          print("jax:", jax.__version__)
          print("tf:", tf.__version__)
          print("cv2:", cv2.__version__)
          print("Import validation passed.")
          PY

      - name: Clean pip cache
        shell: bash -l {0}
        run: |
          conda activate cardreamer
          pip cache purge || true
          conda clean -a -y || true

      - name: Pack conda environment
        shell: bash -l {0}
        run: |
          conda activate cardreamer
          mkdir -p dist
          conda-pack -n cardreamer -o dist/cardreamer-ubuntu2204-py310-cuda121.tar.gz

      - name: Upload packed environment
        uses: actions/upload-artifact@v4
        with:
          name: cardreamer-ubuntu2204-py310-cuda121
          path: dist/cardreamer-ubuntu2204-py310-cuda121.tar.gz
          if-no-files-found: error
