name: Pack horizon_gs Conda Environment

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pack:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Miniconda (base only)
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: latest
          auto-update-conda: false
          auto-activate-base: false

      - name: Create horizon_gs environment
        shell: bash -el {0}
        run: |
          set -euxo pipefail

          # 创建纯 Python 环境
          conda create -n horizon_gs python=3.10 pip=24.2 -y

          # 从 pytorch 官方 channel 安装 CUDA 版本的 PyTorch
          # pytorch-cuda=11.8 会自动带入对应的 cudatoolkit
          conda install -n horizon_gs -y \
            -c pytorch -c nvidia -c conda-forge \
            pytorch=2.1.2 torchvision=0.16.2 torchaudio=2.1.2 \
            pytorch-cuda=11.8

          # 安装 pytorch-scatter（需要 pyg channel）
          conda install -n horizon_gs -y \
            -c pyg -c pytorch -c nvidia -c conda-forge \
            pytorch-scatter

          # 安装 pip 依赖
          conda run -n horizon_gs pip install \
            numpy==1.26.4 \
            pandas==2.2.3 \
            matplotlib==3.9.3 \
            scipy==1.10.1 \
            scikit-learn==1.5.2 \
            plyfile==1.1.3 \
            tensorboard==2.20.0 \
            tqdm==4.67.1 \
            einops==0.8.2 \
            wandb==0.16.6 \
            lpips==0.1.4 \
            laspy==2.7.0 \
            jaxtyping==0.3.7 \
            colorama==0.4.6 \
            "opencv-python==4.10.0.84" \
            open3d==0.19.0 \
            shapely \
            ninja \
            rich \
            kornia

      - name: Show conda information
        shell: bash -el {0}
        run: |
          set -euxo pipefail

          echo "CONDA=$CONDA"
          conda info
          conda env list

          echo "Disk after environment creation:"
          df -h

          echo "horizon_gs env size:"
          du -sh "$CONDA/envs/horizon_gs"

      - name: Check horizon_gs environment
        shell: bash -el {0}
        run: |
          set -euxo pipefail

          echo "Check Python version:"
          conda run -n horizon_gs python -V

          echo "Check PyTorch:"
          conda run -n horizon_gs python - <<'PY'
          import torch
          print("torch:", torch.__version__)
          print("torch cuda:", torch.version.cuda)
          print("cuda available:", torch.cuda.is_available())
          print("cuda device count:", torch.cuda.device_count())
          # GitHub Actions runner 没有 GPU，cuda available 是 False 属正常
          assert torch.version.cuda is not None, "Not a CUDA build!"
          PY

          echo "Check pytorch_scatter:"
          conda run -n horizon_gs python - <<'PY'
          import torch_scatter
          print("torch_scatter:", torch_scatter.__version__)
          PY

          echo "Check important packages:"
          conda run -n horizon_gs python - <<'PY'
          import plyfile, tensorboard, tqdm, einops, wandb
          import lpips, laspy, jaxtyping, colorama, cv2, sklearn
          print("all important packages imported successfully")
          print("cv2:", cv2.__version__)
          print("sklearn:", sklearn.__version__)
          PY

      - name: Install conda-pack into base with pip
        shell: bash
        run: |
          set -exo pipefail

          "$CONDA/bin/python" -m pip install "conda-pack==0.9.1"
          "$CONDA/bin/conda-pack" --version

      - name: Clean caches before packing
        shell: bash -el {0}
        run: |
          set -euxo pipefail

          conda clean -a -y
          rm -rf ~/.cache/pip ~/.cache/torch ~/.cache/huggingface ~/.cache/conda ~/.nv || true

          echo "horizon_gs env size:"
          du -sh "$CONDA/envs/horizon_gs"

          echo "Disk after clean:"
          df -h

      - name: Pack and split horizon_gs environment
        shell: bash
        run: |
          set -exo pipefail

          rm -rf release_parts && mkdir -p release_parts
          rm -f horizon_gs.tar.gz

          "$CONDA/bin/conda-pack" \
            -n horizon_gs \
            -o horizon_gs.tar.gz \
            --format tar.gz \
            --ignore-missing-files \
            --force

          ls -lh horizon_gs.tar.gz
          df -h

          split -b 1900M -d -a 3 horizon_gs.tar.gz release_parts/horizon_gs.tar.gz.part-
          sha256sum horizon_gs.tar.gz > release_parts/horizon_gs.tar.gz.sha256
          rm -f horizon_gs.tar.gz

          cd release_parts
          sha256sum horizon_gs.tar.gz.part-* > SHA256SUMS.txt
          cat SHA256SUMS.txt
          cat horizon_gs.tar.gz.sha256

          df -h

      - name: Create GitHub Release and upload parts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: horizon-gs-conda-${{ github.run_number }}
          name: horizon_gs Conda Environment ${{ github.run_number }}
          body: |
            horizon_gs Conda environment package.

            Environment name:
            ```text
            horizon_gs
            ```

            Python version:
            ```text
            3.10
            ```
          files: |
            release_parts/horizon_gs.tar.gz.part-*
            release_parts/SHA256SUMS.txt
          fail_on_unmatched_files: true
